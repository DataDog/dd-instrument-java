<svg xmlns="http://www.w3.org/2000/svg" width="730" height="234" viewBox="0 0 730 234">
  <defs>
    <style>
      text { font-family: sans-serif; }
    </style>
    <pattern id="long-stripe" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#eff6ff"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#93c5fd" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="730" height="234" fill="#ffffff" rx="6"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Row 1: short jump (all 16 bits, 0..61439)      -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Row label -->
  <text x="40" y="16" font-size="12" font-weight="bold" fill="#1e293b">short jump</text>

  <!-- Bit position numbers -->
  <text x="60"  y="38" text-anchor="middle" font-size="10" fill="#64748b">15</text>
  <text x="100" y="38" text-anchor="middle" font-size="10" fill="#64748b">14</text>
  <text x="140" y="38" text-anchor="middle" font-size="10" fill="#64748b">13</text>
  <text x="180" y="38" text-anchor="middle" font-size="10" fill="#64748b">12</text>
  <text x="220" y="38" text-anchor="middle" font-size="10" fill="#64748b">11</text>
  <text x="260" y="38" text-anchor="middle" font-size="10" fill="#64748b">10</text>
  <text x="300" y="38" text-anchor="middle" font-size="10" fill="#64748b">9</text>
  <text x="340" y="38" text-anchor="middle" font-size="10" fill="#64748b">8</text>
  <text x="380" y="38" text-anchor="middle" font-size="10" fill="#64748b">7</text>
  <text x="420" y="38" text-anchor="middle" font-size="10" fill="#64748b">6</text>
  <text x="460" y="38" text-anchor="middle" font-size="10" fill="#64748b">5</text>
  <text x="500" y="38" text-anchor="middle" font-size="10" fill="#64748b">4</text>
  <text x="540" y="38" text-anchor="middle" font-size="10" fill="#64748b">3</text>
  <text x="580" y="38" text-anchor="middle" font-size="10" fill="#64748b">2</text>
  <text x="620" y="38" text-anchor="middle" font-size="10" fill="#64748b">1</text>
  <text x="660" y="38" text-anchor="middle" font-size="10" fill="#64748b">0</text>

  <!-- JUMP — all 16 bits: x=40 to x=680 -->
  <rect x="40" y="46" width="640" height="40" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <!-- Internal bit dividers -->
  <line x1="80"  y1="46" x2="80"  y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="120" y1="46" x2="120" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="160" y1="46" x2="160" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="200" y1="46" x2="200" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="240" y1="46" x2="240" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="280" y1="46" x2="280" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="320" y1="46" x2="320" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="360" y1="46" x2="360" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="400" y1="46" x2="400" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="440" y1="46" x2="440" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="480" y1="46" x2="480" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="520" y1="46" x2="520" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="560" y1="46" x2="560" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="600" y1="46" x2="600" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="640" y1="46" x2="640" y2="86" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <!-- Label -->
  <text x="360" y="66" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">0x0000..0xEFFF</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- Row 2: long jump (bits 15:12 = LONG-MARKER, bits 11:0 = ID)  -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- Row label -->
  <text x="40" y="142" font-size="12" font-weight="bold" fill="#1e293b">long jump</text>

  <!-- Bit position numbers -->
  <text x="60"  y="164" text-anchor="middle" font-size="10" fill="#64748b">15</text>
  <text x="100" y="164" text-anchor="middle" font-size="10" fill="#64748b">14</text>
  <text x="140" y="164" text-anchor="middle" font-size="10" fill="#64748b">13</text>
  <text x="180" y="164" text-anchor="middle" font-size="10" fill="#64748b">12</text>
  <text x="220" y="164" text-anchor="middle" font-size="10" fill="#64748b">11</text>
  <text x="260" y="164" text-anchor="middle" font-size="10" fill="#64748b">10</text>
  <text x="300" y="164" text-anchor="middle" font-size="10" fill="#64748b">9</text>
  <text x="340" y="164" text-anchor="middle" font-size="10" fill="#64748b">8</text>
  <text x="380" y="164" text-anchor="middle" font-size="10" fill="#64748b">7</text>
  <text x="420" y="164" text-anchor="middle" font-size="10" fill="#64748b">6</text>
  <text x="460" y="164" text-anchor="middle" font-size="10" fill="#64748b">5</text>
  <text x="500" y="164" text-anchor="middle" font-size="10" fill="#64748b">4</text>
  <text x="540" y="164" text-anchor="middle" font-size="10" fill="#64748b">3</text>
  <text x="580" y="164" text-anchor="middle" font-size="10" fill="#64748b">2</text>
  <text x="620" y="164" text-anchor="middle" font-size="10" fill="#64748b">1</text>
  <text x="660" y="164" text-anchor="middle" font-size="10" fill="#64748b">0</text>

  <!-- LONG-MARKER — bits 15:12: x=40 to x=198, 2px gap before TABLE INDEX -->
  <rect x="40" y="172" width="159" height="40" rx="7" fill="url(#long-stripe)" stroke="#93c5fd" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Internal bit dividers within LONG-MARKER -->
  <line x1="80"  y1="172" x2="80"  y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="120" y1="172" x2="120" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="160" y1="172" x2="160" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <!-- LONG-MARKER label -->
  <text x="120" y="192" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">MARKER (0xF)</text>

  <!-- TABLE INDEX — bits 11:0: x=201 to x=680 -->
  <rect x="201" y="172" width="479" height="40" rx="7" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <!-- Internal bit dividers -->
  <line x1="241" y1="172" x2="241" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="281" y1="172" x2="281" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="321" y1="172" x2="321" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="361" y1="172" x2="361" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="401" y1="172" x2="401" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="441" y1="172" x2="441" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="481" y1="172" x2="481" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="521" y1="172" x2="521" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="561" y1="172" x2="561" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="601" y1="172" x2="601" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="641" y1="172" x2="641" y2="212" stroke="#93c5fd" stroke-width="0.7" stroke-dasharray="4,3"/>
  <!-- TABLE INDEX label -->
  <text x="440" y="192" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">TABLE INDEX (0x000..0xFFF)</text>
</svg>
