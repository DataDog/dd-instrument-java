<svg xmlns="http://www.w3.org/2000/svg" width="570" height="560" viewBox="0 0 570 560">
<rect width="570" height="560" fill="#ffffff"/>

<!-- Edges (drawn before nodes so cell fills cover endpoints) -->
<line x1="268" y1="75"  x2="162" y2="140" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="302" y1="75"  x2="408" y2="140" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="145" y1="170" x2="145" y2="215" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="425" y1="170" x2="425" y2="215" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="133" y1="251" x2="97"  y2="304" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="157" y1="251" x2="193" y2="304" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="414" y1="252" x2="381" y2="303" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="436" y1="252" x2="469" y2="303" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="85" y1="340" x2="85" y2="385" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="370" y1="340" x2="370" y2="385" stroke="#94a3b8" stroke-width="1.5"/>

<!-- Root  centre (285,65) -->
<rect x="265" y="45" width="40" height="40" rx="7" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
<circle cx="285" cy="65" r="3" fill="#1e293b"/>

<!-- Level 1  b (145,150)  c (425,150) -->
<rect x="125" y="130" width="40" height="40" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="145" y="150" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">b</text>
<rect x="405" y="130" width="40" height="40" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="425" y="150" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">c</text>

<!-- Level 2  a (145,235)  a (425,235) -->
<rect x="125" y="215" width="40" height="40" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="145" y="235" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">a</text>
<rect x="405" y="215" width="40" height="40" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="425" y="235" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">a</text>

<!-- Level 3 -->
<!-- b-a-l  prefix "bal"  (85,320) -->
<rect x="65"  y="300" width="40" height="40" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="85"  y="320" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">l</text>
<!-- b-a-t  leaf "bat"  (205,320) -->
<rect x="185" y="300" width="40" height="40" rx="7" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="205" y="320" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">t</text>
<text x="235" y="320" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#15803d">leaf</text>
<!-- c-a-r  bud "car"  (370,320) -->
<rect x="350" y="300" width="40" height="40" rx="7" fill="#faf5ff" stroke="#a78bfa" stroke-width="2"/>
<text x="370" y="320" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">r</text>
<text x="400" y="320" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#7c3aed">bud</text>
<!-- c-a-t  leaf "cat"  (480,320) -->
<rect x="460" y="300" width="40" height="40" rx="7" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="480" y="320" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">t</text>
<text x="510" y="320" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#15803d">leaf</text>

<!-- Level 4 -->
<!-- b-a-l-l  leaf "ball"  (85,405) -->
<rect x="65"  y="385" width="40" height="40" rx="7" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="85"  y="405" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">l</text>
<text x="115" y="405" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#15803d">leaf</text>
<!-- c-a-r-e  leaf "care"  (370,405) -->
<rect x="350" y="385" width="40" height="40" rx="7" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="370" y="405" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="15" font-weight="bold" fill="#1e293b">e</text>
<text x="400" y="405" text-anchor="start" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#15803d">leaf</text>

<!-- Legend -->
<text x="44" y="462" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="0.05em" fill="#1e293b">LEGEND</text>
<rect x="44"  y="476" width="34" height="28" rx="5" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
<circle cx="61" cy="490" r="2" fill="#1e293b"/>
<text x="86"  y="491" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#374151">root node</text>
<rect x="310" y="476" width="34" height="28" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="2"/>
<text x="327" y="491" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">K</text>
<text x="352" y="491" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#374151">character node</text>
<rect x="44"  y="514" width="34" height="28" rx="5" fill="#faf5ff" stroke="#a78bfa" stroke-width="2"/>
<text x="61"  y="529" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">bud</text>
<text x="86"  y="529" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#374151">update result, continue</text>
<rect x="310" y="514" width="34" height="28" rx="5" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
<text x="327" y="529" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="11" font-weight="bold" fill="#1e293b">leaf</text>
<text x="352" y="529" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#374151">update result, stop</text>
</svg>
